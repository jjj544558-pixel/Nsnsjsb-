<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #121212; color: #00ffcc; font-family: monospace; display: flex; justify-content: center; overflow: hidden; }
        #game-area { width: 60vw; height: 100vh; border-right: 1px solid #333; position: relative; }
        #sidebar { width: 40vw; padding: 20px; }
        .char { position: absolute; font-size: 2rem; cursor: pointer; }
        button { background: #333; color: #fff; border: none; padding: 10px; margin: 5px; cursor: pointer; display: block; width: 100%; }
        button:hover { background: #444; }
    </style>
</head>
<body>
    <div id="game-area"></div>
    <div id="sidebar">
        <h1>Points: <span id="points">0</span></h1>
        <p>KPS: <span id="kps">0</span></p>
        <button onclick="buyUpgrade('auto')">Buy Auto-Typist (50 pts)</button>
        <button onclick="buyUpgrade('greek')">Unlock Greek (200 pts)</button>
    </div>

    <script>
        let state = { points: 0, kps: 0, unlockedGreek: false };
        const container = document.getElementById('game-area');
        const latin = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const greek = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ".split("");

        function spawn() {
            let pool = state.unlockedGreek ? [...latin, ...greek] : latin;
            let el = document.createElement('div');
            el.className = 'char';
            el.innerText = pool[Math.floor(Math.random() * pool.length)];
            el.style.left = Math.random() * 80 + '%';
            el.style.top = '-50px';
            el.onclick = () => { state.points += 10; el.remove(); };
            container.appendChild(el);
            
            let pos = 0;
            let move = setInterval(() => {
                pos += 2;
                el.style.top = pos + 'px';
                if (pos > window.innerHeight) { el.remove(); clearInterval(move); }
            }, 50);
        }

        function buyUpgrade(type) {
            if (type === 'auto' && state.points >= 50) { state.points -= 50; state.kps += 1; }
            if (type === 'greek' && state.points >= 200) { state.points -= 200; state.unlockedGreek = true; }
        }

        setInterval(() => { state.points += state.kps; document.getElementById('points').innerText = Math.floor(state.points); }, 1000);
        setInterval(spawn, 1500);
    </script>
</body>
</html>
